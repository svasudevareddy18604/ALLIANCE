<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Alliance University</title>
    <link rel="stylesheet" href="../dean/dean_login.css">
</head>

<body>
<div class="overlay"></div>

<div class="login-wrapper">
    <div class="login-box" style="max-width:420px;">
        

        <img src="../images/AU.png" class="logo">

        <h2>Reset Password</h2>
        <p class="tagline" style="font-size:14px;">
            Create a new secure password for your account
        </p>

        <form id="resetForm" novalidate>
            <input
                type="password"
                id="password"
                placeholder="New Password"
                required
            >

            <input
                type="password"
                id="confirm"
                placeholder="Confirm New Password"
                required
            >

            <div id="errorMsg" class="error-message"></div>
            <div id="successMsg" class="success-message" style="display:none;"></div>

            <button type="submit" formnovalidate>Update Password</button>

        </form>

        <p class="note" style="margin-top:18px;">
            <a href="/faculty/login" style="color:#2e7d32;text-decoration:none;">
                ← Back to Login
            </a>
        </p>
    </div>
</div>

<script>
/* =====================================================
   🔥 FORCE KILL ANY EXISTING 8-CHAR VALIDATION (ONE STEP)
===================================================== */
document.addEventListener("DOMContentLoaded", () => {

    // Remove ALL browser-level password constraints
    document.querySelectorAll("input[type=password]").forEach(input => {
        input.removeAttribute("minlength");
        input.setCustomValidity("");
    });

    // Remove any pre-filled error text (CSS/HTML injected)
    document.querySelectorAll(".error-message").forEach(el => {
        el.textContent = "";
    });

});
</script>

<script>
/* =========================
   ACTUAL RESET LOGIC (MIN 4)
========================= */
const form = document.getElementById("resetForm");
const errorMsg = document.getElementById("errorMsg");
const successMsg = document.getElementById("successMsg");

const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if (!email) {
    errorMsg.textContent =
        "Session expired. Please restart the password reset process.";
    errorMsg.style.display = "block";
    form.style.display = "none";
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.style.display = "none";
    successMsg.style.display = "none";

    const password = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirm").value.trim();

    if (!password || !confirm) {
        showError("All fields are required.");
        return;
    }

    if (password.length < 4) {
        showError("Password must be at least 4 characters long.");
        return;
    }

    if (password !== confirm) {
        showError("Passwords do not match.");
        return;
    }

    try {
        const res = await fetch("/faculty/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
            showError(data.error || "Failed to reset password.");
            return;
        }

        successMsg.textContent =
            "Password updated successfully. Redirecting to login...";
        successMsg.style.display = "block";

        setTimeout(() => {
            window.location.href = "/faculty/login";
        }, 2000);

    } catch (err) {
        console.error(err);
        showError("Server error. Please try again.");
    }
});

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
}
</script>
</body>
</html>
