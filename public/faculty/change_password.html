<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Alliance University</title>
    <link rel="stylesheet" href="../dean/dean_login.css">
</head>

<body>
    <div class="overlay"></div>

    <div class="login-wrapper">
        <div class="login-box" style="max-width:420px;">

            <img src="../images/AU.png" class="logo">

            <h2>Forgot Password</h2>
            <p class="tagline">
                Enter your university email address.<br>
                We’ll verify and send an OTP.
            </p>

            <form id="forgotForm">
                <input type="email" id="email" placeholder="example@ced.alliance.edu.in" required>

                <div id="errorMsg" class="error-message"></div>
                <div id="successMsg" class="success-message" style="display:none;"></div>

                <button type="submit">Send OTP</button>
            </form>

            <p class="note">
                <a href="/faculty/login">← Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById("forgotForm");
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");

        const UNIVERSITY_DOMAIN = "@ced.alliance.edu.in";

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorMsg.style.display = "none";
            successMsg.style.display = "none";

            const email = document.getElementById("email").value.trim().toLowerCase();

            if (!email) {
                showError("University email is required.");
                return;
            }

            if (!email.endsWith(UNIVERSITY_DOMAIN)) {
                showError("Only Alliance University email is allowed.");
                return;
            }

            try {
                const res = await fetch("/faculty/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || "Email not found.");
                    return;
                }

                successMsg.textContent = "OTP sent successfully. Redirecting...";
                successMsg.style.display = "block";

                // ✅ PASS EMAIL IN URL (CRITICAL)
                setTimeout(() => {
                    window.location.href =
                        `/faculty/verify_otp.html?email=${encodeURIComponent(email)}`;
                }, 1500);

            } catch (err) {
                showError("Server error. Please try again.");
                console.error(err);
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
        }
    </script>
</body>

</html>
