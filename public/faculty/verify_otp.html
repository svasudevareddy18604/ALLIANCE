<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verify OTP | Alliance University</title>
    <link rel="stylesheet" href="../dean/dean_login.css">
</head>

<body>
    <div class="overlay"></div>

    <div class="login-wrapper">
        <div class="login-box" style="max-width:420px;">

            <img src="../images/AU.png" class="logo">

            <h2>Verify OTP</h2>
            <p class="tagline">
                Enter the 6-digit OTP sent to your university email
            </p>

            <form id="otpForm">
                <input type="text" id="otp" placeholder="Enter OTP" maxlength="6" required>

                <div id="errorMsg" class="error-message"></div>

                <button type="submit">Verify OTP</button>
            </form>

            <p class="note">
                <a href="/faculty/login">← Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById("otpForm");
        const errorMsg = document.getElementById("errorMsg");

        const params = new URLSearchParams(window.location.search);
        const email = params.get("email");

        // 🚫 HARD BLOCK IF EMAIL MISSING
        if (!email) {
            errorMsg.textContent =
                "Session expired. Please go back and request OTP again.";
            errorMsg.style.display = "block";
            form.style.display = "none";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorMsg.style.display = "none";

            if (!email) {
                showError("Session expired. Please request OTP again.");
                return;
            }

            const otp = document.getElementById("otp").value.trim();

            if (!otp || otp.length !== 6) {
                showError("Please enter a valid 6-digit OTP.");
                return;
            }

            try {
                const res = await fetch("/faculty/verify-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, otp })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || "Invalid or expired OTP.");
                    return;
                }

                // ✅ OTP VERIFIED → RESET PASSWORD
                window.location.href =
                    `/faculty/reset-password.html?email=${encodeURIComponent(email)}`;

            } catch (err) {
                showError("Server error. Please try again.");
                console.error(err);
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = "block";
        }
    </script>
</body>

</html>
