<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survey | Faculty Portal</title>

<link rel="icon" href="https://i.postimg.cc/ydqLPCpT/AULOGOOLD.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Tahoma}
body{background:#f4f7fb}

/* SIDEBAR */
.sidebar{
  position:fixed;left:0;top:0;
  width:240px;height:100vh;
  background:linear-gradient(180deg,#1f4e79,#16324f,#0f2437)
}
.brand-text{padding:26px 20px;border-bottom:1px solid rgba(255,255,255,.15)}
.brand-text h3{color:#fff;font-size:18px}
.brand-text p{color:#cfd8dc;font-size:13px}
.menu{list-style:none;padding:18px 0}
.menu li{
  padding:14px 22px;margin:6px 14px;
  border-radius:10px;color:#e0e0e0;
  cursor:pointer;display:flex;gap:14px
}
.menu li:hover{background:rgba(255,255,255,.14)}
.menu li.active{background:#fff;color:#16324f;font-weight:600}
.menu li.logout{
  border-top:1px solid rgba(255,255,255,.15);
  margin-top:18px;color:#ffb4b4
}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:240px;right:0;
  height:100px;background:#b87333;
  display:flex;align-items:center;justify-content:center;
  z-index:10
}
.top-logo img{height:70px}

/* MAIN */
.main-content{
  margin-left:240px;
  padding:120px 40px 40px
}

/* HEADER */
.page-header h2{font-size:22px}
.page-header p{color:#666;margin-top:6px}

/* BUTTON */
.primary-btn{
  background:#1f4e79;
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px
}
.primary-btn:hover{background:#16324f}

.secondary-btn{
  padding:6px 14px;
  border:none;
  border-radius:6px;
  background:#1f2d3d;
  color:#fff;
  cursor:pointer;
  font-size:13px
}
.secondary-btn:hover{background:#2e3f52}

/* TABLE */
.faculty-table{
  width:100%;
  background:#fff;
  border-radius:14px;
  border-collapse:collapse;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  overflow:hidden
}
.faculty-table th,
.faculty-table td{
  padding:14px 16px;
  border-bottom:1px solid #e5e7eb;
  text-align:center;
  font-size:14px
}
.faculty-table thead{
  background:#f1f5f9;
  font-weight:600
}
.faculty-table tbody tr:hover{
  background:#f7faff
}

/* STATUS BADGES */
.status-badge{
  padding:4px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  display:inline-block
}
.status-draft{background:#fff3cd;color:#856404}
.status-published{background:#e6fffa;color:#065f46}
.status-closed{background:#fdecea;color:#7f1d1d}
</style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand-text">
    <h3>Alliance University</h3>
    <p>Faculty Portal</p>
  </div>

  <ul class="menu">
    <li onclick="go('/faculty/dashboard')">
      <i class="fas fa-chart-pie"></i>Dashboard
    </li>
    <li onclick="go('/faculty/facultystudents.html')">
      <i class="fas fa-user-graduate"></i>My Students
    </li>
    <li class="active">
      <i class="fas fa-poll"></i>Survey
    </li>
    <li onclick="go('/faculty/facultyreports.html')">
      <i class="fas fa-chart-line"></i>Reports
    </li>
    <li onclick="go('/faculty/facultyuploadmarks.html')">
      <i class="fas fa-upload"></i>Marks Upload
    </li>
    <li onclick="go('/faculty/faculty-feedback.html')">
      <i class="fas fa-comments"></i>Feedback
    </li>
    <li onclick="go('/faculty/facultyvideo.html')">
      <i class="fas fa-video"></i>Video
    </li>
    <li class="logout" onclick="go('/faculty/logout')">
      <i class="fas fa-sign-out-alt"></i>Logout
    </li>
  </ul>
</aside>

<!-- MAIN -->
<main class="main-content">

<header class="topbar">
  <div class="top-logo">
    <img src="../images/AU.png" alt="Alliance University">
  </div>
</header>

<section class="page-header">
  <h2>Survey Management</h2>
  <p>Create, publish, and track surveys</p>
</section>

<section style="margin-top:20px">
  <button class="primary-btn" onclick="go('/faculty/facultycreatesurvey.html')">
    + Create New Survey
  </button>
</section>

<section style="margin-top:26px">
<table class="faculty-table">
<thead>
<tr>
  <th>Survey Title</th>
  <th>Status</th>
  <th>Answered</th>
  <th>Not Answered</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="surveyTableBody">
<tr>
  <td colspan="5" style="color:#888">Loading surveys...</td>
</tr>
</tbody>
</table>
</section>

</main>

<script>
function go(p){location.href=p}

function viewSurvey(id){
  location.href=`/faculty/survey-view.html?survey_id=${id}`;
}

async function loadSurveys(){
  try{
    const r=await fetch("/faculty/surveys",{credentials:"include"});
    if(!r.ok) throw 0;
    const data=await r.json();
    const tb=document.getElementById("surveyTableBody");
    tb.innerHTML="";

    if(!data.length){
      tb.innerHTML="<tr><td colspan='5'>No surveys created yet</td></tr>";
      return;
    }

    data.forEach(s=>{
      let cls="status-draft";
      if(s.status==="PUBLISHED") cls="status-published";
      if(s.status==="CLOSED") cls="status-closed";

      tb.innerHTML+=`
      <tr>
        <td>${s.title}</td>
        <td><span class="status-badge ${cls}">${s.status}</span></td>
        <td>${s.answered_count}</td>
        <td>${s.not_answered_count}</td>
        <td>
          <button class="secondary-btn" onclick="viewSurvey(${s.survey_id})">
            View
          </button>
        </td>
      </tr>`;
    });
 
  }catch (e) {
  console.error("Failed to load surveys", e);
  document.getElementById("surveyTableBody").innerHTML =
    "<tr><td colspan='5'>Failed to load surveys</td></tr>";
}

  }

loadSurveys();
</script>

</body>
</html>
