<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dean Portal | Sections Management</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   GLOBAL RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: #f6f8fb;
    color: #333;
}

/* =========================
   SIDEBAR (DEAN DASHBOARD)
========================= */
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 240px;
    height: 100vh;
    background: linear-gradient(180deg, #1680ae, #203a43, #2c5364);
    box-shadow: 2px 0 12px rgba(0,0,0,0.25);
}

.brand {
    text-align: center;
    padding: 25px 15px;
    color: #fff;
}

.brand h3 {
    font-size: 20px;
}

.brand p {
    font-size: 13px;
    opacity: 0.85;
}

.menu {
    list-style: none;
}

.menu li {
    padding: 14px 22px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.25s;
}

.menu li i {
    width: 20px;
    text-align: center;
}

.menu li:hover,
.menu li.active {
    background: rgba(255,255,255,0.2);
}

/* =========================
   MAIN CONTENT
========================= */
.main {
    margin-left: 240px;
    min-height: 100vh;
}

/* =========================
   HEADER / TOP BAR
========================= */
.header {
    background: #cd8648;
    height: 70px;
    padding: 0 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.header h2 {
    color: #fff;
    font-size: 20px;
}

.add-btn {
    background: #fff;
    color: #333;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 500;
}

.add-btn:hover {
    background: #f2f2f2;
}

/* =========================
   PAGE CONTENT
========================= */
.container {
    padding: 30px;
}

/* =========================
   TABLE
========================= */
.table-card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th {
    background: #f3f6fa;
    padding: 14px;
    text-align: left;
}

td {
    padding: 14px;
    border-bottom: 1px solid #e6e6e6;
}

tr:hover {
    background: #fafafa;
}

/* =========================
   ACTION BUTTONS
========================= */
.delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #922b21;
    font-size: 15px;
}

.delete-btn:hover {
    transform: scale(1.1);
}

/* =========================
   MODAL
========================= */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.modal-content {
    background: #fff;
    padding: 25px;
    width: 420px;
    border-radius: 14px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

.modal-content h3 {
    margin-bottom: 15px;
}

.modal-content input,
.modal-content select {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.modal-actions button {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.modal-actions button:first-child {
    background: #ccc;
}

.modal-actions button:last-child {
    background: #1680ae;
    color: #fff;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="brand">
        <h3>Alliance University</h3>
        <p>Dean Portal</p>
    </div>

    <ul class="menu">
        <li onclick="location.href='deandashboard.html'">
            <i class="fas fa-chart-pie"></i> Dashboard
        </li>
        <li class="active">
            <i class="fas fa-layer-group"></i> Sections
        </li>
        <li onclick="location.href='deancourses.html'">
            <i class="fas fa-book"></i> Courses
        </li>
    </ul>
</aside>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h2>Sections Management (Dean Only)</h2>
        <button class="add-btn" onclick="openModal()">+ Add Section</button>
    </div>

    <!-- CONTENT -->
    <div class="container">
        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Academic Year (UI only)</th>
                        <th>Course</th>
                        <th>Section</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="sectionsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="sectionModal">
    <div class="modal-content">
        <h3>Add Section</h3>

        <input id="year" placeholder="Academic Year (not saved)">
        <select id="course">
            <option value="">Select Course</option>
            <option>BTech</option>
            <option>BBA</option>
            <option>LLB</option>
            <option>MBA</option>
        </select>
        <input id="section" placeholder="Section">

        <div class="modal-actions">
            <button onclick="closeModal()">Cancel</button>
            <button onclick="addSection()">Save</button>
        </div>
    </div>
</div>

<script>
const API = "/api/dean/sections";
const body = document.getElementById("sectionsBody");
const yearInput = document.getElementById("year");
const courseInput = document.getElementById("course");
const sectionInput = document.getElementById("section");

/* LOAD */
fetch(API)
.then(res => res.json())
.then(data => {
    body.innerHTML = "";
    data.forEach(r => renderRow("—", r.course, r.section));
});

function renderRow(year, course, section) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td>${year}</td>
        <td>${course}</td>
        <td>${section}</td>
        <td>
            <button class="delete-btn" onclick="deleteSection('${course}','${section}')">
                <i class="fas fa-trash"></i>
            </button>
        </td>
    `;
    body.appendChild(tr);
}

/* ADD */
function addSection() {
    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            course: courseInput.value,
            section: sectionInput.value
        })
    }).then(() => {
        renderRow(yearInput.value, courseInput.value, sectionInput.value);
        closeModal();
    });
}

/* DELETE */
function deleteSection(course, section) {
    if (!confirm("Delete section?")) return;

    fetch(API, {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ course, section })
    }).then(() => location.reload());
}

function openModal() {
    sectionModal.style.display = "flex";
}
function closeModal() {
    sectionModal.style.display = "none";
}
</script>

</body>
</html>
