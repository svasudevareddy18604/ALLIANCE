<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Management | Alliance University</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="deandashboard.css">

<style>

/* ================= PAGE HEADER ================= */
.page-header{
  padding:30px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.page-header h2{
  font-size:22px;
  font-weight:600;
}

/* ================= PRIMARY BUTTON ================= */
.primary-btn{
  background:#1680ae;
  color:#fff;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow:0 6px 16px rgba(22,128,174,0.35);
}
.primary-btn:hover{
  background:#126892;
}

/* ================= TABLE ================= */
.table-card{
  background:#fff;
  margin:0 40px 40px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow:hidden;
}

.faculty-table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
.faculty-table th{
  background:#f4f7fb;
  padding:14px;
  text-align:left;
  font-weight:600;
}
.faculty-table td{
  padding:14px;
  border-bottom:1px solid #eee;
}
.faculty-table tr:hover{
  background:#fafafa;
}

/* ================= STATUS ================= */
.status-badge{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}
.status-active{ background:#e6f7ee; color:#1e8449; }
.status-inactive{ background:#fdecea; color:#922b21; }

/* ================= ACTION BUTTONS ================= */
.actions{
  display:flex;
  gap:10px;
}
.icon-btn{
  border:none;
  background:#f1f3f6;
  width:34px;
  height:34px;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.icon-btn i{ font-size:14px; }
.icon-btn.edit{ color:#1f618d; }
.icon-btn.power{ color:#922b21; }
.icon-btn:hover{
  transform:scale(1.1);
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.modal-content{
  background:#fff;
  width:460px;
  border-radius:18px;
  padding:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}
.modal-content h3{
  margin-bottom:18px;
  font-size:18px;
}
.modal-content input{
  width:100%;
  padding:11px 14px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-bottom:12px;
  font-size:14px;
}
.modal-footer{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:10px;
}
.modal-footer button{
  padding:9px 18px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}
.cancel-btn{ background:#ccc; }
.save-btn{ background:#1680ae; color:#fff; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="brand-text">
    <h3>Alliance University</h3>
    <p>Dean Office Portal</p>
  </div>
  <ul class="menu">
    <li onclick="go('/dean/dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</li>
    <li class="active"><i class="fas fa-user-tie"></i> Faculty Management</li>
    <li onclick="go('/dean/deanstudents.html')"><i class="fas fa-user-graduate"></i> Students</li>
    <li onclick="go('/dean/deansections.html')"><i class="fas fa-layer-group"></i> Sections</li>
    <li onclick="go('/dean/deanreports.html')"><i class="fas fa-chart-line"></i> Reports</li>
    <li class="logout" onclick="go('/dean/logout')"><i class="fas fa-sign-out-alt"></i> Logout</li>
  </ul>
</aside>

<main class="main-content">

<header class="topbar">
  <div class="top-logo"><img src="../images/AU.png"></div>
</header>

<section class="page-header">
  <h2>Faculty Management</h2>
  <button class="primary-btn" onclick="openModal()">
    <i class="fas fa-plus"></i> Add Faculty
  </button>
</section>

<div class="table-card">
<table class="faculty-table">
<thead>
<tr>
  <th>ID</th>
  <th>Profile</th>
  <th>Name</th>
  <th>Department</th>
  <th>Designation</th>
  <th>Email</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>
<tbody id="facultyTable"></tbody>
</table>
</div>

</main>

<!-- MODAL -->
<div id="facultyModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Faculty</h3>

    <input id="f_name" placeholder="Full Name">
    <input id="f_email" type="email" placeholder="Email">
    <input id="f_phone" placeholder="Phone">
    <input id="f_dept" placeholder="Department">
    <input id="f_desig" placeholder="Designation">
    <input id="f_image" type="file">

    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="save-btn" onclick="saveFaculty()">Save</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_AVATAR="https://image2url.com/images/1766296630960-b33463a0-3042-4646-85e2-deb80f900160.jpg";
let editId=null;

const facultyModal=document.getElementById("facultyModal");
const facultyTable=document.getElementById("facultyTable");

function go(p){ location.href=p }

function openModal(){
  editId=null;
  modalTitle.innerText="Add Faculty";
  f_name.value=f_email.value=f_phone.value=f_dept.value=f_desig.value="";
  facultyModal.style.display="flex";
}
function closeModal(){ facultyModal.style.display="none"; }

/* LOAD */
function loadFaculty(){
fetch("/dean/faculty")
.then(r=>r.json())
.then(data=>{
facultyTable.innerHTML="";
data.forEach(f=>{
const active=(f.status||"").toUpperCase()==="ACTIVE";
facultyTable.innerHTML+=`
<tr>
<td>${f.faculty_id}</td>
<td><img src="${f.profile_image||DEFAULT_AVATAR}" style="width:38px;height:38px;border-radius:50%"></td>
<td>${f.full_name}</td>
<td>${f.department||"-"}</td>
<td>${f.designation||"-"}</td>
<td>${f.email}</td>
<td><span class="status-badge ${active?"status-active":"status-inactive"}">${active?"Active":"Inactive"}</span></td>
<td>
<div class="actions">
<button class="icon-btn edit" onclick='editFaculty(${JSON.stringify(f)})'><i class="fas fa-edit"></i></button>
<button class="icon-btn power" onclick="toggleStatus('${f.id}','${f.status}')"><i class="fas fa-power-off"></i></button>
</div>
</td>
</tr>`;
});
});
}

/* EDIT */
function editFaculty(f){
editId=f.id;
modalTitle.innerText="Edit Faculty";
f_name.value=f.full_name;
f_email.value=f.email;
f_phone.value=f.phone||"";
f_dept.value=f.department||"";
f_desig.value=f.designation||"";
facultyModal.style.display="flex";
}

/* SAVE */
function saveFaculty(){
const fd=new FormData();
fd.append("full_name",f_name.value);
fd.append("email",f_email.value);
fd.append("phone",f_phone.value);
fd.append("department",f_dept.value);
fd.append("designation",f_desig.value);
if(f_image.files[0]) fd.append("profile_image",f_image.files[0]);

fetch(editId?`/dean/faculty/${editId}`:"/dean/faculty",{method:editId?"PUT":"POST",body:fd})
.then(()=>{ closeModal(); loadFaculty(); });
}

/* TOGGLE */
function toggleStatus(id,status){
fetch(`/dean/faculty/${id}/status`,{
method:"PATCH",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status:status==="ACTIVE"?"inactive":"active"})
}).then(()=>loadFaculty());
}

loadFaculty();
</script>
</body>
</html>
