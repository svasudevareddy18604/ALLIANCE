<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survey | Alliance University</title>

    <link rel="icon" type="image/png" href="https://i.postimg.cc/ydqLPCpT/AULOGOOLD.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../dean/deandashboard.css">

    <style>
        body {
            margin: 0;
            background: #f6f8fb;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #1680ae, #203a43, #2c5364);
        }

        .brand-text {
            padding: 28px 20px;
            border-bottom: 1px solid rgba(255,255,255,.1);
        }

        .brand-text h3 { color: #fff; margin: 0; }
        .brand-text p { color: #cfd8dc; font-size: 13px; }

        .menu li {
            padding: 14px 22px;
            margin: 6px 12px;
            border-radius: 10px;
            color: #e0e0e0;
            cursor: pointer;
        }

        .menu li.active {
            background: #fff;
            color: #203a43;
            font-weight: 600;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 240px;
            right: 0;
            height: 95px;
            background: #cd8648;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            margin-left: 240px;
            padding: 130px 40px 40px;
        }

        .box {
            max-width: 950px;
            background: hsl(60, 63%, 82%);
            padding: 42px;
            border-radius: 14px;
        }

        .question {
            background: #f9fbfd;
            border: 1px solid #e3e9f0;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 22px;
        }

        .question-title {
            font-weight: 600;
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin: 8px 0;
            cursor: pointer;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccd6e0;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg,#203a43,#2c5364);
            color: #fff;
            cursor: pointer;
        }

        .status {
            text-align: center;
            padding: 60px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="brand-text">
        <h3>Alliance University</h3>
        <p>Student Portal</p>
    </div>
    <ul class="menu">
        <li onclick="go('studentdashboard.html')"><i class="fas fa-home"></i> Dashboard</li>
        <li class="active"><i class="fas fa-poll"></i> Survey</li>
        <li onclick="go('upload-video.html')"><i class="fas fa-video"></i> Upload Video</li>
        <li onclick="go('studentacademicdata.html')"><i class="fas fa-graduation-cap"></i> Academic Results</li>
        <li onclick="go('reports.html')"><i class="fas fa-chart-line"></i> Reports</li>
        <li onclick="go('mentor.html')"><i class="fas fa-user-tie"></i> Mentor</li>
        <li onclick="go('feedback.html')"><i class="fas fa-comments"></i> Feedback</li>
        <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
    </ul>
</aside>

<header class="topbar">
    <img src="../images/AU.png" height="65">
</header>

<main class="main-content">
    <div class="box" id="surveyBox">
        <h2>Loading survey...</h2>
    </div>
</main>

<script>
function go(p){ location.href="/student/"+p }
function logout(){ location.href="/student/logout" }

fetch("/student/surveys/active",{credentials:"include"})
.then(r=>r.json())
.then(data=>{
    const box=document.getElementById("surveyBox");

    if(!data.id){
        box.innerHTML=`<div class="status"><h3>No active survey</h3></div>`;
        return;
    }

    if(data.submitted){
        box.innerHTML=`<div class="status"><h3>Survey already submitted 😊</h3></div>`;
        return;
    }

    let html=`<h2>${data.title}</h2><p>Please answer all questions</p>`;

    data.questions.forEach((q,i)=>{
        html+=`<div class="question" data-id="${q.id}">
               <div class="question-title">${i+1}. ${q.question_text}</div>`;

        if(q.question_type==="numeric"){
            html+=`<input type="number" required>`;
        }
        else if(q.question_type==="yesno"){
            html+=`
                <label><input type="radio" name="q${q.id}" value="Yes"> Yes</label>
                <label><input type="radio" name="q${q.id}" value="No"> No</label>`;
        }
        else if(q.question_type==="likert"){
            ["Strongly Agree","Agree","Neutral","Disagree","Strongly Disagree"]
            .forEach(o=>{
                html+=`<label>
                        <input type="radio" name="q${q.id}" value="${o}"> ${o}
                       </label>`;
            });
        }
        else if(q.question_type==="mcq" && q.options){
    q.options.forEach(o=>{
        html+=`<label>
            <input type="radio" name="q${q.id}" value="${o}">
            ${o}
        </label>`;
    });
}

        else{
            html+=`<input type="text" required>`;
        }

        html+=`</div>`;
    });

    html+=`<button class="submit-btn" onclick="submitSurvey(${data.id})">Submit Survey</button>`;
    box.innerHTML=html;
});

function submitSurvey(id){
    const responses=[];
    document.querySelectorAll(".question").forEach(q=>{
        const input=q.querySelector("input:checked, input:not([type=radio]), textarea");
        if(!input || !input.value.trim()){
            alert("Answer all questions");
            throw 0;
        }
        responses.push({
            question_id:q.dataset.id,
            answer_value:input.value.trim()
        });
    });

    fetch("/student/surveys/submit",{
        method:"POST",
        credentials:"include",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ survey_id:id, responses })
    }).then(()=>location.reload());
}
</script>

</body>
</html>
